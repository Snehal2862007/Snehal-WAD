
<!DOCTYPE html>
<html>
<head>
<title>Rowspan and Colspan Example</title>
</head>

<body>

<h2>Table with Rowspan and Colspan</h2>

<table border="1">

<tr>
<th>Name</th>
<th colspan="2">Marks</th>
</tr>

<tr>
<td rowspan="2">Snehal</td>
<td>Math</td>
<td>90</td>
</tr>

<tr>
<td>Science</td>
<td>85</td>
</tr>

<tr>
<td>Rahul</td>
<td>Math</td>
<td>88</td>
</tr>

</table>

</body>
</html>
