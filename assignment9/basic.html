<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Registration - Basic HTML</title>
</head>
<body>
    <div style="background: #f1f5f9; padding: 10px; text-align: center; border-bottom: 1px solid #cbd5e1; font-family: sans-serif;">
        <b>Name:</b> Snehal Ranjeet Dalavi | <b>Roll No:</b> 10
    </div>

    <h1>Employee Registration Form</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <p>
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" required>
            </p>
            <p>
                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" required>
            </p>
            <p>
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </p>
            <p>
                <label>Gender:</label>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
            </p>
        </fieldset>

        <fieldset>
            <legend>Professional Details</legend>
            <p>
                <label for="dept">Department:</label>
                <select id="dept" name="dept">
                    <option value="hr">Human Resources</option>
                    <option value="it">Information Technology</option>
                    <option value="sales">Sales</option>
                    <option value="marketing">Marketing</option>
                </select>
            </p>
            <p>
                <label for="doj">Date of Joining:</label>
                <input type="date" id="doj" name="doj">
            </p>
            <p>
                <label for="resume">Upload Resume:</label>
                <input type="file" id="resume" name="resume">
            </p>
        </fieldset>

        <p>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the terms and conditions.</label>
        </p>

        <p>
            <input type="submit" value="Register Employee">
            <input type="reset" value="Clear Form">
        </p>
    </form>
</body>
</html>
