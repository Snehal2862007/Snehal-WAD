<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration - Modern CSS</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #9333ea;
            --bg: #f5f3ff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        .student-header {
            background: var(--primary);
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 2rem;
            font-weight: 800;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select,
        textarea {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            background-color: #f8fafc;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .gender-options {
            display: flex;
            gap: 20px;
            padding: 10px 0;
        }

        .gender-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-submit {
            background-color: var(--primary);
            color: white;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-reset {
            background-color: #f1f5f9;
            color: #475569;
        }

        .btn-reset:hover {
            background-color: #e2e8f0;
        }

        .terms-check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="student-header">
        Name: Snehal Ranjeet Dalavi | Roll No: 10
    </div>

    <div class="container">
        <h1>Employee Registration</h1>
        <form>
            <div class="form-grid">
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" placeholder="Enter first name" required>
                </div>
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" placeholder="Enter last name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="email@company.com" required>
                </div>
                <div class="form-group">
                    <label for="dept">Department</label>
                    <select id="dept">
                        <option value="" disabled selected>Select Department</option>
                        <option value="hr">Human Resources</option>
                        <option value="it">Information Technology</option>
                        <option value="sales">Sales</option>
                        <option value="marketing">Marketing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="doj">Date of Joining</label>
                    <input type="date" id="doj" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div class="gender-options">
                        <label class="gender-item"><input type="radio" name="gender" value="male"> Male</label>
                        <label class="gender-item"><input type="radio" name="gender" value="female"> Female</label>
                        <label class="gender-item"><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label for="bio">Short Bio</label>
                    <textarea id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                </div>
                <div class="form-group full-width">
                    <label for="resume">Upload Resume</label>
                    <input type="file" id="resume">
                </div>
            </div>

            <div class="terms-check">
                <input type="checkbox" id="terms" required>
                <label for="terms">I confirm that the provided information is accurate.</label>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-submit">Complete Registration</button>
                <button type="reset" class="btn-reset">Reset Form</button>
            </div>
        </form>
    </div>
</body>
</html>
