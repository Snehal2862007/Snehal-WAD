<!-- Snehal Ranjeet Dalavi | Roll No: 10 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5 - Attractive Image Link</title>
    <style>
        :root {
            --primary: #f59e0b; /* Amber/Orange */
            --bg: #fffbeb;
            --text: #78350f;
            --card: #ffffff;
            --border: #fef3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 25px -5px rgba(245, 158, 11, 0.1);
            text-align: center;
            max-width: 600px;
            border: 2px solid var(--border);
        }

        .student-box {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            border: 1px dashed var(--primary);
        }

        h2 {
            margin: 0;
            font-size: 1.3rem;
            line-height: 1.6;
        }

        .w3-btn {
            display: inline-block;
            margin: 2rem 0;
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .w3-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 10px 15px rgba(245, 158, 11, 0.3);
        }

        .logo-box {
            margin-top: 1rem;
            padding: 2rem;
            background: #fafafa;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .logo-box:hover {
            background: #fdfdfd;
        }

        .logo-box img {
            max-width: 100%;
            height: auto;
            transition: transform 0.3s ease;
        }

        .logo-box:hover img {
            transform: rotate(-3deg) scale(1.05);
        }
    </style>
</head>
<body>
    <div style="background: #f59e0b; color: white; padding: 10px; text-align: center; font-family: sans-serif; font-size: 0.9rem;">
        Name: Snehal Ranjeet Dalavi | Roll No: 10
    </div>
    <div class="container">
        <div class="student-box">
            <h2>Snehal Ranjeet Dalavi<br>
                Roll No: 10</h2>
        </div>
        
        <a href="https://www.w3schools.com/" target="_top" class="w3-btn">🚀 Visit W3Schools.com!</a>
        
        <div class="logo-box">
            <a href="https://leetcode.com" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/LeetCode_logo_black.png"
                     alt="Click to Open LeetCode"
                     width="400">
            </a>
        </div>
    </div>
</body>
</html>
